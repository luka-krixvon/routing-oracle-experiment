# =====================================================================
# pool_open8.yaml — 8-model open-weight pool + sampling config
# Target hardware: 2x RTX 4090 (48GB total, ~44GB usable, data-parallel)
# Pilot:  N~1000, k=20, ~2-3h.   Full: N~5000, k>=20 (k>=30 rare), overnight.
# Theory anchors: A1 (per-draw independence), A8 (seed alignment), T=0.2.
# =====================================================================

seed: 42                      # root seed; per-(query,draw-index) seeds derived from this

# ---------------------------------------------------------------------
# MODEL POOL — 8 open-weight models, deliberately diverse (architecture,
# scale, family, training paradigm) to create genuine routing opportunity.
# VRAM/quant chosen so the static pool co-resides on 2x4090; in practice
# stage 02 loads ONE model at a time (vLLM), so per-model VRAM is the only
# hard constraint — the device map below is the all-resident fallback.
# NOTE: repo_ids must be verified live before the full run (see verify list).
# ---------------------------------------------------------------------
model_pool:
  name: "openweight_8_diverse"
  backend: vllm
  models:
    - repo_id: "google/gemma-4-12B-it"
      family: gemma
      params_b: 12
      active_params_b: 12
      arch: dense
      quantization: fp16
      est_vram_gb: 24
      device: "cuda:0"
      role: "dense anchor, broad instruction capability"

    - repo_id: "Qwen/Qwen2.5-14B-Instruct"
      family: qwen
      params_b: 14
      active_params_b: 14
      arch: dense
      quantization: awq-4bit
      est_vram_gb: 3.5
      device: "cuda:0"
      role: "code + reasoning, distinct alignment from gemma"

    - repo_id: "microsoft/Phi-4"
      family: phi
      params_b: 14
      active_params_b: 14
      arch: dense
      quantization: awq-4bit
      est_vram_gb: 3.5
      device: "cuda:0"
      role: "synthetic-data pretraining, orthogonal failure modes"

    - repo_id: "mistralai/Mistral-7B-Instruct-v0.3"
      family: mistral
      params_b: 7
      active_params_b: 7
      arch: dense
      quantization: fp16
      est_vram_gb: 14
      device: "cuda:0"
      role: "lightweight baseline, strong in-context learning"

    - repo_id: "google/gemma-4-26B-A4B-it"
      family: gemma
      params_b: 104           # dense-equivalent
      active_params_b: 4      # MoE active per token
      arch: moe
      quantization: awq-4bit
      est_vram_gb: 6.5
      device: "cuda:1"
      role: "MoE — different capacity/efficiency curve, distinct routing dynamics"

    - repo_id: "Qwen/Qwen2.5-32B-Instruct"
      family: qwen
      params_b: 32
      active_params_b: 32
      arch: dense
      quantization: awq-4bit
      est_vram_gb: 8
      device: "cuda:1"
      role: "scale leverage — catches hard queries the 14B class misses"

    - repo_id: "meta-llama/Llama-3.2-11B-Instruct"
      family: llama
      params_b: 11
      active_params_b: 11
      arch: dense
      quantization: fp16
      est_vram_gb: 22
      device: "cuda:1"
      role: "Llama anchor — orthogonal tokenizer/training to qwen/gemma"

    - repo_id: "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
      family: deepseek
      params_b: 7
      active_params_b: 7
      arch: dense
      quantization: fp16
      est_vram_gb: 14
      device: "cuda:0"
      role: "distilled long-CoT reasoning — complements instruction-only models"

# ---------------------------------------------------------------------
# SAMPLING — seed-aligned (A8) draws at benchmark temperature (T=0.2).
# Hotter sampling is FORBIDDEN: it manufactures the noise we are measuring.
# ---------------------------------------------------------------------
sampling:
  temperature: 0.2            # benchmark decoding temp; do NOT raise
  top_p: 1.0                  # full distribution (no nucleus truncation)
  top_k: -1                   # disabled
  max_tokens: 2048            # generous, avoid truncation artifacts
  add_greedy: true            # one T=0 draw per (query,model) as a diagnostic

  # --- A8: seed alignment across the pool ---------------------------
  # For each query i and draw index j in [0..k-1], EVERY model m is sampled
  # with the SAME seed s_ij = hash(seed, i, j). This makes b[i,m,j] a
  # seed-aligned K-tuple so that  O^exp_i = (1/k) sum_j max_m b[i,m,j]
  # is exactly unbiased (no A2 independence assumption, no O(1/k) bias).
  seed_alignment: true
  seed_scheme: "s_ij = SHA1(root_seed, query_id, draw_index)"
  # If a provider/backend cannot honor per-draw seeds (A8 fails), the
  # pipeline must fall back to the Fréchet bracket (see oracles.frechet).
  store_per_draw_index: true  # persist b[i,m,j] aligned by j, NOT just counts

  k: 20                       # draws per (query,model) overall
  k_rare: 30                  # >= 30 in the thin-support (rare-correct) stratum
  k_sweep: [1, 2, 5, 10, 20]  # convergence diagnostic only

# ---------------------------------------------------------------------
# BENCHMARK / STRATIFICATION — exact-match analyzed SEPARATELY from judge.
# ---------------------------------------------------------------------
benchmark:
  exact_match_datasets: ["gsm8k", "math500", "mbpp", "humaneval", "mmlu_pro", "gpqa"]
  judge_datasets: []                 # omit for pilot; exact-match scope only
  subset_size_pilot: 1000
  subset_size_full: 5000
  rare_correct_max: 3                # rare-correct stratum = <= 3 models correct
  oversample_rare_frac: 0.40         # 40% of subset drawn from rare stratum
  guided_decoding:                   # constrain multiple-choice to valid letters
    enabled: true
    backend: "lm-format-enforcer"
    mc_choices: ["A", "B", "C", "D", "E"]

# ---------------------------------------------------------------------
# ROUTER — clairvoyant reproducible router for the ceiling comparison.
# ---------------------------------------------------------------------
router:
  class: "oracle_weight"             # r*(i) = argmax_m p_im (reproducible ceiling)

# ---------------------------------------------------------------------
# ORACLES / DECOMPOSITION ESTIMANDS (see EXPERIMENT_ARCHITECTURE.md §2).
# ---------------------------------------------------------------------
oracles:
  o_exp_flavor: "seed_aligned"       # (1/k) sum_j max_m b[i,m,j]   (A1 only)
  o_exp_perp_envelope: true          # 1 - prod_m(1-phat): report as UPPER envelope only
  cov_gate: true                     # require Cov>=0 before trusting the perp envelope
  o_repro_flavor: "raw_frequency"    # max_m phat_im, phat = counts/k (NOT Beta-mean)
  o_agg_rule: "majority"             # self-consistency / plurality vote (verifier-free)
  frechet_bracket: true              # [max_m phat, min(sum_m phat,1)] when A8 absent
  threshold_taus: [0.3, 0.5, 0.7, 0.9, 0.95]
  conservative_bounds: true          # one-sided Delta_lower with winner's-curse radius
  one_sided_direction: "repro_up_exp_down"   # ADD R_k to O^repro, SUBTRACT R'_k from O^exp
  bonferroni: true                   # 2*delta split across strata; SAME form every stratum

# ---------------------------------------------------------------------
# STATISTICS.
# ---------------------------------------------------------------------
stats:
  bootstrap_B: 1000
  posterior_prior: [1, 1]            # Beta(1,1) — used ONLY for CIs, never the oracle
  nested_ci: true
  mcnemar_rare: true
  alpha: 0.05

# ---------------------------------------------------------------------
# GATES — BLOCK the magnitude study if either fails (report nothing).
# ---------------------------------------------------------------------
gates:
  known_p_simulation:
    enabled: true
    description: "simulate correctness under estimated p; #correct-models dist must match observed"
    ks_pvalue_min: 0.05
  independence_test:
    enabled: true
    description: "runs test / over-dispersion vs p(1-p)/k against provider caching (tests A1)"
    overdispersion_ratio_max: 1.25   # Var_obs / [p(1-p)/k] must not exceed this
    runs_pvalue_min: 0.01

# ---------------------------------------------------------------------
# FALSIFIABLE TEST — the one experiment that can refute the thesis.
# ---------------------------------------------------------------------
best_of_k_test:
  enabled: true
  target_model: "committed_best"     # argmax_m mean_i p_im, chosen in advance
  budget_match: true                 # K draws of one model vs O^exp,perp at matched budget
  pass_condition: "best_of_K >= O_exp_perp - slack"
  slack: 0.01                        # weak-dominance tolerance
  fail_implies: "A1 violated (caching/dependence), NOT the theorem"

# ---------------------------------------------------------------------
# HARDWARE.
# ---------------------------------------------------------------------
hardware:
  gpus: [0, 1]
  gpu_model: "RTX 4090"
  total_vram_gb: 48
  usable_vram_gb: 44
  data_parallel: true
  load_one_model_at_a_time: true     # stage 02 default: serialize model loads, free between
  quantization_policy: "awq-4bit for params_b>=13 (dense-equiv); fp16 below"

paths:
  raw: data/raw
  processed: data/processed
  results: results
  figs: paper/figs

# ---------------------------------------------------------------------
# repo_id verification checklist (run before the full overnight job):
#   google/gemma-4-12B-it, google/gemma-4-26B-A4B-it,
#   Qwen/Qwen2.5-14B-Instruct, Qwen/Qwen2.5-32B-Instruct,
#   meta-llama/Llama-3.2-11B-Instruct, mistralai/Mistral-7B-Instruct-v0.3,
#   deepseek-ai/DeepSeek-R1-Distill-Qwen-7B, microsoft/Phi-4
# If any id 404s, substitute the nearest same-family/scale sibling and keep
# the diversity axes (family, scale, dense-vs-MoE, reasoning-distilled) intact.
# ---------------------------------------------------------------------
